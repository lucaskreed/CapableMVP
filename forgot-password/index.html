<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password | Capable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-config.js"></script>
    <script src="../assets/js/auth.js" defer></script>
</head>

<body data-auth-page="forgot">
    <div class="form-card">
        <h1>Reset Password</h1>
        <p>We'll email you a link to set a new password.</p>

        <div class="field">
            <label>Email Address</label>
            <input type="email" id="reset-email" placeholder="jane@example.com">
            <span class="error-text" id="status-msg"></span>
        </div>

        <button id="send-btn" type="button">Send Reset Link</button>

        <div class="footer-link">
            Remembered it? <a href="/login/">Back to Login</a>
        </div>
    </div>
</body>

</html>
