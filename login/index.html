<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Capable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/auth.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-config.js"></script>
    <script src="../assets/js/auth.js" defer></script>
</head>

<body data-auth-page="login">

    <div class="form-card">
        <h1>Welcome Back</h1>
        <p>Enter your details to sign in.</p>

        <button class="google-btn" id="google-signin-btn" type="button">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
            Continue with Google
        </button>

        <div class="divider">or use email</div>

        <div class="field">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="jane@example.com">
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="••••••••">
            <span class="error-text" id="auth-error"></span>
        </div>

        <button id="login-btn" type="button">Sign In</button>

        <div class="footer-link">
            Don't have an account? <a href="/signup/">Sign Up</a>
        </div>
    </div>
</body>

</html>
