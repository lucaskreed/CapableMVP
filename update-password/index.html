<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Password | Capable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="../assets/js/auth.js" defer></script>
</head>
<body data-auth-page="update">
  <div class="form-card">
    <h1>Create New Password</h1>
    <p>Enter a strong password to secure your account.</p>

    <div class="field">
      <label>New Password</label>
      <input type="password" id="new-pass" placeholder="8+ characters">
    </div>

    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="conf-pass" placeholder="Repeat password">
      <span class="error-text" id="update-error"></span>
    </div>

    <button id="update-btn" type="button">Update Password</button>
  </div>
</body>
</html>
